name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint & Build (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint

      - name: Run build validation
        run: npm run build

  deploy-to-vm:
    name: Deploy to VM & Build Directly (CD)
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH and Deploy
        run: |
          # Setup SSH key and directory
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

          # SSH into the VM, pull latest changes, and build/run the containers
          ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "
            # Set up project directory on VM if it doesn't exist
            if [ ! -d '~/ai_governance_practices' ]; then
              echo 'Directory does not exist. Cloning repository...'
              git clone https://github.com/eleluong/agentic_ai_practices.git ~/ai_governance_practices
            fi
            
            cd ~/ai_governance_practices &&
            echo 'Updating code...' &&
            git fetch origin &&
            git checkout main &&
            git reset --hard origin/main &&
            
            echo 'Building and starting containers...' &&
            docker compose up --build -d
          "
